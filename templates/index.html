<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <main class="page-shell">
        <section class="analysis-panel">
            <h1>Emotion Detection</h1>
            <p class="lede">Analyze customer feedback and identify the dominant emotion.</p>

            <label for="textToAnalyze">Enter text to analyze</label>
            <textarea
                id="textToAnalyze"
                name="textToAnalyze"
                autocomplete="off"
                rows="5"
            ></textarea>

            <button type="button" onclick="runEmotionAnalysis()">Run analysis</button>
            <p id="system_response" class="response-output" aria-live="polite"></p>
        </section>
    </main>
    <script src="{{ url_for('static', filename='mywebscript.js') }}"></script>
</body>
</html>
